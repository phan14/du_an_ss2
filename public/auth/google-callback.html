<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Auth Callback</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 {
      color: #333;
      margin: 0;
    }
    p {
      color: #666;
      font-size: 14px;
      margin: 0.5rem 0 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h2>Đang xác thực Google...</h2>
    <p>Vui lòng đợi trong giây lát</p>
  </div>

  <script>
    // Extract the access token from the URL fragment
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const error = params.get('error');

    if (error) {
      document.body.innerHTML = `
        <div class="container" style="background: #fee;">
          <h2 style="color: #c33;">❌ Lỗi Xác Thực</h2>
          <p style="color: #c33;">${decodeURIComponent(error)}</p>
          <button onclick="window.close()" style="padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 1rem;">Đóng Cửa Sổ</button>
        </div>
      `;
    } else if (accessToken) {
      // Send token to parent window
      if (window.opener) {
        window.opener.postMessage({
          type: 'GOOGLE_AUTH_TOKEN',
          token: accessToken
        }, window.location.origin);
        
        // Show success message
        setTimeout(() => {
          document.body.innerHTML = `
            <div class="container" style="background: #efe;">
              <h2 style="color: #3c3;">✅ Xác Thực Thành Công</h2>
              <p style="color: #3c3;">Cửa sổ sẽ đóng sau 2 giây...</p>
            </div>
          `;
          setTimeout(() => window.close(), 2000);
        }, 500);
      } else {
        // Fallback if opener is not available
        localStorage.setItem('google_auth_token', accessToken);
        document.body.innerHTML = `
          <div class="container" style="background: #efe;">
            <h2 style="color: #3c3;">✅ Xác Thực Thành Công</h2>
            <p style="color: #3c3;">Token đã được lưu. Bạn có thể đóng tab này.</p>
            <button onclick="window.close()" style="padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 1rem;">Đóng Cửa Sổ</button>
          </div>
        `;
      }
    } else {
      document.body.innerHTML = `
        <div class="container" style="background: #fee;">
          <h2 style="color: #c33;">❌ Không Tìm Thấy Token</h2>
          <p style="color: #c33;">Vui lòng thử lại</p>
          <button onclick="window.close()" style="padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 1rem;">Đóng Cửa Sổ</button>
        </div>
      `;
    }
  </script>
</body>
</html>
